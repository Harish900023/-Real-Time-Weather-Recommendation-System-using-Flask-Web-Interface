<!DOCTYPE html><html><head><style>
.typing-indicator { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; }
.typing-indicator span { width: 6px; height: 6px; background-color: blue; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
</style></head><body>
<div id='out'></div>
<script>
function typeWriterHTML(element, html, speed = 15) {
    element.innerHTML = '';
    let tempDiv = document.createElement('div');
    tempDiv.innerHTML = html;
    
    function typeNode(node, targetEl, cb) {
        if (node.nodeType === Node.TEXT_NODE) {
            let text = node.textContent;
            let i = 0;
            let textNode = document.createTextNode('');
            targetEl.appendChild(textNode);
            function typeChar() {
                if (i < text.length) {
                    textNode.textContent += text.charAt(i);
                    i++;
                    setTimeout(typeChar, speed);
                } else {
                    if (cb) cb();
                }
            }
            typeChar();
        } else if (node.nodeType === Node.ELEMENT_NODE) {
            let newEl = document.createElement(node.tagName);
            Array.from(node.attributes).forEach(attr => newEl.setAttribute(attr.name, attr.value));
            targetEl.appendChild(newEl);
            if (node.childNodes.length > 0) {
                typeNodes(Array.from(node.childNodes), newEl, cb);
            } else {
                if (cb) cb();
            }
        } else {
            if (cb) cb();
        }
    }

    function typeNodes(nodes, targetEl, cb) {
        let index = 0;
        function next() {
            if (index < nodes.length) {
                typeNode(nodes[index++], targetEl, next);
            } else if (cb) {
                cb();
            }
        }
        next();
    }

    typeNodes(Array.from(tempDiv.childNodes), element);
}
let div = document.getElementById('out');
div.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
setTimeout(() => {
    typeWriterHTML(div, '<b>Typing</b> <i>works!</i>\n<br>Line 2.', 20);
}, 1000);
</script></body></html>
